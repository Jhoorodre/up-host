name: Build Windows Executable

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install PyInstaller

    - name: Build executable
      run: |
        pyinstaller src/main.py `
          --name MangaUploaderPro `
          --onefile `
          --windowed `
          --distpath dist `
          --paths src `
          --hidden-import=core `
          --hidden-import=core.config `
          --hidden-import=core.hosts `
          --hidden-import=core.models `
          --hidden-import=core.services `
          --hidden-import=ui `
          --hidden-import=ui.backend `
          --hidden-import=ui.handlers `
          --hidden-import=ui.models `
          --hidden-import=utils `
          --hidden-import=utils.helpers `
          --hidden-import=utils.json_updater `
          --hidden-import=utils.sanitizer `
          --hidden-import=loguru `
          --hidden-import=qasync `
          --hidden-import=aiohttp `
          --hidden-import=aiofiles `
          --hidden-import=httpx `
          --hidden-import=pydantic `
          --hidden-import=tenacity `
          --hidden-import=psutil `
          --hidden-import=PIL `
          --hidden-import=yaml `
          --hidden-import=dotenv `
          --hidden-import=watchdog `
          --hidden-import=beautifulsoup4 `
          --hidden-import=pyimgbox `
          --collect-all=PySide6 `
          --add-data "src/ui/qml:ui/qml" `
          --add-data "src/ui/qml/assets:ui/qml/assets"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MangaUploaderPro-Windows
        path: dist/MangaUploaderPro.exe
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/MangaUploaderPro.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
